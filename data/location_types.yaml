---
- name: Provider
  description: "Top-level provider / operator"
  content_types:
    - dcim.device
  deployment_types: [all]

- name: Region
  description: "Geographic region"
  parent: Provider
  content_types:
    - dcim.device
  deployment_types: [all]
    
- name: Site
  description: "Physical or logical site"
  parent: Region          # <-- ADD (Site currently has no parent)
  content_types:          
    - dcim.device
    - dcim.rack
  deployment_types: [all]

- name: Building
  description: "Building within a site"
  parent: Site
  content_types:
    - dcim.device
    - dcim.rack
  deployment_types: [all]

- name: Room
  description: "Room within a building"
  parent: Building
  content_types:
    - dcim.device
    - dcim.rack
  deployment_types: [all]


---
# Physical rack elevations for the STC devices: device -> rack / U-position / face.
#
# This is INVENTORY data (where a box physically sits), kept in one map independent of the
# render-intent designs. Applied idempotently by LoadBootstrapData.load_device_placements():
# it updates rack/position/face on the EXISTING Device.
#
# Ordering: devices are created by the fabric/server DesignJobs, so run/re-run this AFTER them.
# A device not found yet is skipped with a log line (not an error).
#
# skip: true  => managed manually (via the Nautobot UI) — GitOps IGNORES it. The two spines were
#                placed by hand, so they carry skip: true (documented here, but not touched on apply).

# --- blr-net-rack01 : spine pair + border leaves + OOB + DC-GW + vFW ---
- device: RMDC-GPU-SETH01
  rack: blr-net-rack01
  position: 42
  face: front
  skip: true            # UI-managed (placed by hand) — GitOps ignores
- device: RMDC-GPU-SETH02
  rack: blr-net-rack01
  position: 41
  face: front
  skip: true            # UI-managed (placed by hand) — GitOps ignores
